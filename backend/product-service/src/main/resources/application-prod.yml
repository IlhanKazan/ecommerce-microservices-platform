server:
  port: 8084

spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/${PRODUCT_DB_NAME}
    username: ${PRODUCT_DB_USERNAME}
    password: ${PRODUCT_DB_PASSWORD}
    hikari:
      minimum-idle: 2
      maximum-pool-size: 10
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  flyway:
    connect-retries: 10
    connect-retries-interval: 3

  kafka:
    producer:
      bootstrap-servers: kafka:9092
      acks: all
      retries: 3
      properties:
        enable.idempotence: true

  data:
    redis:
      host: redis
      port: 6379
      password: ${REDIS_PASSWORD}

  devtools:
    restart:
      enabled: false

security:
  oauth2:
    resourceserver:
      jwt:
        jwk-set-uri: http://keycloak:8080/realms/${REALM_NAME}/protocol/openid-connect/certs
        issuer-uri: http://localhost:8080/realms/${REALM_NAME}

minio:
  url: http://minio:9000
  access-key: ${MINIO_ACCESS_KEY}
  secret-key: ${MINIO_SECRET_KEY}
  bucket-name: ${USER_MINIO_BUCKET}

application:
  clients:
    user-tenant:
      url: http://user-tenant-service:8081

management:
  tracing:
    sampling:
      probability: 0.1
  zipkin:
    tracing:
      endpoint: http://zipkin:9411/api/v2/spans

logging:
  level:
    root: WARN
    com.ecommerce.productservice: INFO

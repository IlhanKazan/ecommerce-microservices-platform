<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="tr">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Ödemeniz Alındı</title>
    <style>
        body { margin: 0; padding: 0; background-color: #f5f5f5; font-family: Arial, sans-serif; }
        .container { max-width: 600px; margin: 40px auto; background: #ffffff; border-radius: 8px; overflow: hidden; }
        .header { background-color: #388e3c; padding: 32px; text-align: center; }
        .header h1 { color: #ffffff; margin: 0; font-size: 24px; }
        .body { padding: 32px; color: #333333; }
        .body h2 { font-size: 20px; margin-top: 0; }
        .body p { line-height: 1.6; }
        .amount-box { background: #f1f8e9; border: 1px solid #c5e1a5; border-radius: 6px; padding: 16px 20px; margin: 16px 0; text-align: center; }
        .amount-box .amount { font-size: 28px; font-weight: bold; color: #2e7d32; }
        .amount-box .label { font-size: 13px; color: #558b2f; margin-top: 4px; }
        .footer { background: #f5f5f5; padding: 20px 32px; text-align: center; color: #888888; font-size: 12px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>E-Commerce Platform</h1>
    </div>
    <div class="body">
        <h2>Ödemeniz Başarıyla Alındı</h2>
        <p>Merhaba,</p>
        <p>Aşağıdaki ödeme başarıyla gerçekleştirildi.</p>
        <div class="amount-box">
            <div class="amount"><span th:text="${amount}">0.00</span> <span th:text="${currency}">TRY</span></div>
            <div class="label" th:text="${paymentType}">SUBSCRIPTION</div>
        </div>
        <p>İşleminiz için teşekkür ederiz.</p>
    </div>
    <div class="footer">
        <p>Bu e-posta otomatik olarak gönderilmiştir. Lütfen yanıtlamayınız.</p>
    </div>
</div>
</body>
</html>

server:
  port: 8084

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/${PRODUCT_DB_NAME}
    username: ${PRODUCT_DB_USERNAME}
    password: ${PRODUCT_DB_PASSWORD}
  kafka:
    producer:
      bootstrap-servers: localhost:29092
  data:
    redis:
      host: localhost
      port: 6379
      password: ${REDIS_PASSWORD}

security:
  oauth2:
    resource server:
      jwt:
        issuer-uri: http://localhost:8080/realms/${REALM_NAME}
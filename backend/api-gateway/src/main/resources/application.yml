spring:
  application:
    name: api-gateway
  profiles:
    active: dev
  config:
    import: optional:file:.env[.properties]

  cloud:
    gateway:
      server:
        webflux:
          globalcors:
            cors-configurations:
              '[/**]':
                          allowedOrigins:
                            - "http://localhost:5173"
                            - "http://localhost:3000"
                          allowedMethods: "*"
                          allowedHeaders: "*"
                          allowCredentials: true
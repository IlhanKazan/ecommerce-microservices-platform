server:
  port: 8086

spring:
  data:
    redis:
      host: redis
      port: 6379
      password: ${REDIS_PASSWORD}

  devtools:
    restart:
      enabled: false

security:
  oauth2:
    resourceserver:
      jwt:
        jwk-set-uri: http://keycloak:8080/realms/${REALM_NAME}/protocol/openid-connect/certs
        issuer-uri: http://localhost:8080/realms/${REALM_NAME}

application:
  clients:
    user-tenant:
      url: http://user-tenant-service:8081
    product:
      url: http://product-service:8084

management:
  tracing:
    sampling:
      probability: 0.1
  zipkin:
    tracing:
      endpoint: http://zipkin:9411/api/v2/spans

logging:
  level:
    root: WARN
    com.ecommerce.basketservice: INFO

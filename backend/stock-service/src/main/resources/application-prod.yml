server:
  port: 8087

spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/${STOCK_DB_NAME}
    username: ${STOCK_DB_USERNAME}
    password: ${STOCK_DB_PASSWORD}
    hikari:
      minimum-idle: 2
      maximum-pool-size: 10
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  flyway:
    connect-retries: 10
    connect-retries-interval: 3

  kafka:
    bootstrap-servers: kafka:9092
    consumer:
      group-id: stock-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

  data:
    redis:
      host: redis
      port: 6379
      password: ${REDIS_PASSWORD}

  devtools:
    restart:
      enabled: false

security:
  oauth2:
    resourceserver:
      jwt:
        jwk-set-uri: http://keycloak:8080/realms/${REALM_NAME}/protocol/openid-connect/certs
        issuer-uri: http://localhost:8080/realms/${REALM_NAME}

app:
  scheduling:
    enabled: true

application:
  clients:
    product:
      url: http://product-service:8084
    user-tenant:
      url: http://user-tenant-service:8081

management:
  tracing:
    sampling:
      probability: 0.1
  zipkin:
    tracing:
      endpoint: http://zipkin:9411/api/v2/spans

logging:
  level:
    root: WARN
    com.ecommerce.stockservice: INFO

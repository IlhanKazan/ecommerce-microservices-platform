global:
  scrape_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'spring-boot-services'
    metrics_path: '/actuator/prometheus'
    scrape_timeout: 10s
    static_configs:
      - targets:
        - '172.23.0.1:8081'
        - '172.23.0.1:8082'

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
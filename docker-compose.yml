services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - ./infrastructure/zookeeper_data:/var/lib/zookeeper/data
    ports:
      - "2181:2181"
    networks:
      - e-commerce-network
    healthcheck:
      test: echo ruok | nc 127.0.0.1 2181 || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256m

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: ${KAFKA_BROKER_ID:-1}
      KAFKA_ZOOKEEPER_CONNECT: 'zookeeper:2181'
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    volumes:
      - ./infrastructure/kafka_data:/var/lib/kafka/data
    ports:
      - "29092:29092"
    networks:
      - e-commerce-network
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "kafka:9092", "--list"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1g

  kafdrop:
    image: obsidiandynamics/kafdrop:latest
    container_name: kafdrop
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BROKERCONNECT: kafka:9092
      JVM_OPTS: "-Xms128M -Xmx256M"
    ports:
      - "9000:9000"
    networks:
      - e-commerce-network
    deploy:
      resources:
        limits:
          memory: 256m

  postgres:
    image: postgres:16
    container_name: postgres
    command: ["postgres", "-c", "wal_level=logical"]
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./infrastructure/postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - e-commerce-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 2g

  redis:
    image: redis:6.2-alpine
    container_name: redis
    command: redis-server --requirepass "${REDIS_PASSWORD}"
    ports:
      - "127.0.0.1:6379:6379"
    networks:
      - e-commerce-network
    deploy:
      resources:
        limits:
          memory: 256m

  connect:
    image: debezium/connect:2.7.3.Final
    container_name: debezium-connect
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8083:8083"
    networks:
      - e-commerce-network
    environment:
      BOOTSTRAP_SERVERS: kafka:9092
      GROUP_ID: 1
      CONFIG_STORAGE_TOPIC: connect_configs
      OFFSET_STORAGE_TOPIC: connect_offsets
      STATUS_STORAGE_TOPIC: connect_statuses
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
      HEAP_OPTS: "-Xmx512m -Xms256m"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 1g

  connector-init:
    image: curlimages/curl:latest
    container_name: connector-init
    restart: "no"
    depends_on:
      connect:
        condition: service_healthy
    networks:
      - e-commerce-network
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./infrastructure/scripts/docker-init-connectors.sh:/init-connectors.sh:ro
      - ./infrastructure/debezium/user-tenant-connector.json:/connectors/user-tenant-connector.json:ro
      - ./infrastructure/debezium/product-connector.json:/connectors/product-connector.json:ro
      - ./infrastructure/debezium/stock-connector.json:/connectors/stock-connector.json:ro
      - ./infrastructure/debezium/payment-connector.json:/connectors/payment-connector.json:ro
    command: ["/bin/sh", "/init-connectors.sh"]

  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    ports:
      - "9005:9000"
      - "9001:9001"
    networks:
      - e-commerce-network
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - ./infrastructure/minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512m

  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - e-commerce-network
    deploy:
      resources:
        limits:
          memory: 128m

  keycloak:
    build:
      context: .
      dockerfile: infrastructure/keycloak/Dockerfile
    container_name: keycloak
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak_db
      KC_DB_USERNAME: ${POSTGRES_USER}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      KC_HOSTNAME: localhost
      KC_HTTP_ENABLED: true
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_HOSTNAME_URL: http://localhost:8080
      KC_HOSTNAME_ADMIN_URL: http://localhost:8080
      KC_HTTP_PORT: 8080
      MY_SPI_USER_SERVICE_BASE_URL: ${MY_SPI_USER_SERVICE_BASE_URL}
      MY_SPI_KEYCLOAK_TOKEN_URL: ${MY_SPI_KEYCLOAK_TOKEN_URL}
      MY_SPI_CLIENT_ID: ${MY_SPI_CLIENT_ID}
      MY_SPI_CLIENT_SECRET: ${MY_SPI_CLIENT_SECRET}
      MY_SPI_USER_SERVICE_HEALTH_URL: ${MY_SPI_USER_SERVICE_HEALTH_URL}
    ports:
      - "8080:8080"
    networks:
      - e-commerce-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./infrastructure/keycloak/import:/opt/keycloak/data/import
    command: start-dev --import-realm
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 1g

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.3.1
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    networks:
      - e-commerce-network
    volumes:
      - ./infrastructure/elasticsearch_data:/usr/share/elasticsearch/data
    deploy:
      resources:
        limits:
          memory: 1g

  user-tenant-service:
    build:
      context: ./backend
      dockerfile: user-tenant-service/Dockerfile
    container_name: user-tenant-service
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_started
      keycloak:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: prod
      USER_DB_NAME: ${USER_DB_NAME}
      USER_DB_USERNAME: ${USER_DB_USERNAME}
      USER_DB_PASSWORD: ${USER_DB_PASSWORD}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REALM_NAME: ${REALM_NAME}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      USER_MINIO_BUCKET: ${USER_MINIO_BUCKET}
      USER_TENANT_SERVICE_URL: http://user-tenant-service:8081
    ports:
      - "8081:8081"
    networks:
      - e-commerce-network
    deploy:
      resources:
        limits:
          memory: 512m

  mail-service:
    build:
      context: ./backend
      dockerfile: mail-service/Dockerfile
    container_name: mail-service
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      mailhog:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: prod
      MAIL_DB_NAME: ${MAIL_DB_NAME}
      MAIL_DB_USERNAME: ${MAIL_DB_USERNAME}
      MAIL_DB_PASSWORD: ${MAIL_DB_PASSWORD}
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
      SMTP_USERNAME: ""
      SMTP_PASSWORD: ""
      SMTP_AUTH: "false"
      SMTP_STARTTLS: "false"
      MAIL_FROM_ADDRESS: noreply@ecommerce.dev
    ports:
      - "8089:8089"
    networks:
      - e-commerce-network
    deploy:
      resources:
        limits:
          memory: 256m

  product-service:
    build:
      context: ./backend
      dockerfile: product-service/Dockerfile
    container_name: product-service
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
      keycloak:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: prod
      PRODUCT_DB_NAME: ${PRODUCT_DB_NAME}
      PRODUCT_DB_USERNAME: ${PRODUCT_DB_USERNAME}
      PRODUCT_DB_PASSWORD: ${PRODUCT_DB_PASSWORD}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REALM_NAME: ${REALM_NAME}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      USER_MINIO_BUCKET: ${USER_MINIO_BUCKET}
    ports:
      - "8084:8084"
    networks:
      - e-commerce-network
    deploy:
      resources:
        limits:
          memory: 512m

  api-gateway:
    build:
      context: ./backend
      dockerfile: api-gateway/Dockerfile
    container_name: api-gateway
    depends_on:
      user-tenant-service:
        condition: service_started
      payment-service:
        condition: service_started
      product-service:
        condition: service_started
      stock-service:
        condition: service_started
      search-service:
        condition: service_started
      basket-service:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: prod
      REALM_NAME: ${REALM_NAME}
    ports:
      - "9050:9050"
    networks:
      - e-commerce-network
    deploy:
      resources:
        limits:
          memory: 256m

  basket-service:
    build:
      context: ./backend
      dockerfile: basket-service/Dockerfile
    container_name: basket-service
    depends_on:
      redis:
        condition: service_started
      keycloak:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: prod
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REALM_NAME: ${REALM_NAME}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID}
    ports:
      - "8086:8086"
    networks:
      - e-commerce-network
    deploy:
      resources:
        limits:
          memory: 256m

  search-service:
    build:
      context: ./backend
      dockerfile: search-service/Dockerfile
    container_name: search-service
    depends_on:
      kafka:
        condition: service_healthy
      elasticsearch:
        condition: service_started
      redis:
        condition: service_started
      keycloak:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: prod
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REALM_NAME: ${REALM_NAME}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID}
    ports:
      - "8085:8085"
    networks:
      - e-commerce-network
    deploy:
      resources:
        limits:
          memory: 512m

  stock-service:
    build:
      context: ./backend
      dockerfile: stock-service/Dockerfile
    container_name: stock-service
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_started
      keycloak:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: prod
      STOCK_DB_NAME: ${STOCK_DB_NAME}
      STOCK_DB_USERNAME: ${STOCK_DB_USERNAME}
      STOCK_DB_PASSWORD: ${STOCK_DB_PASSWORD}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REALM_NAME: ${REALM_NAME}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID}
    ports:
      - "8087:8087"
    networks:
      - e-commerce-network
    deploy:
      resources:
        limits:
          memory: 512m

  payment-service:
    build:
      context: ./backend
      dockerfile: payment-service/Dockerfile
    container_name: payment-service
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_started
      keycloak:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: prod
      PAYMENT_DB_NAME: ${PAYMENT_DB_NAME}
      PAYMENT_DB_USERNAME: ${PAYMENT_DB_USERNAME}
      PAYMENT_DB_PASSWORD: ${PAYMENT_DB_PASSWORD}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REALM_NAME: ${REALM_NAME}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID}
      IYZICO_API_KEY: ${IYZICO_API_KEY}
      IYZICO_SECRET_KEY: ${IYZICO_SECRET_KEY}
      IYZICO_BASE_URL: ${IYZICO_BASE_URL}
    ports:
      - "8082:8082"
    networks:
      - e-commerce-network
    deploy:
      resources:
        limits:
          memory: 512m

networks:
  e-commerce-network:
    driver: bridge
    name: e-commerce-network